<script>
const wrap = document.querySelector('.chart-wrap');
const svg = document.querySelector('svg');
const tooltip = document.getElementById('tooltip');
document.querySelectorAll('.bar').forEach(bar => {
  bar.addEventListener('mousemove', (e) => {
    const year = bar.getAttribute('data-year');
    const value = bar.getAttribute('data-value');
    const assets = bar.getAttribute('data-assets');
    const liabilities = bar.getAttribute('data-liabilities');
    tooltip.innerHTML = `
      <div class="tt-year">${year}</div>
      <div class="tt-ratio">${value}%</div>
      <div class="tt-detail">Assets: $${assets}T</div>
      <div class="tt-detail">Liabilities: $${liabilities}T</div>
    `;
    tooltip.style.display = 'block';

    const wrapRect = wrap.getBoundingClientRect();
    const tipRect = tooltip.getBoundingClientRect();
    const margin = 12;
    const cursorOffset = 18;

    // position relative to the wrap container, tracking the mouse
    let x = e.clientX - wrapRect.left;
    let y = e.clientY - wrapRect.top;

    // default: tooltip sits above-right of the cursor
    let left = x - tipRect.width/2;
    let top = y - tipRect.height - cursorOffset;

    // if it would run off the top, show it below the cursor instead
    if (top < margin) {
      top = y + cursorOffset;
    }
    // clamp horizontally so it never runs off either edge of the chart
    left = Math.max(margin, Math.min(left, wrapRect.width - tipRect.width - margin));
    // clamp vertically as a final safety net
    top = Math.max(margin, Math.min(top, wrapRect.height - tipRect.height - margin));

    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
  });
  bar.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
});
</script>
